{% extends "account_layout.html" %}

{% block card %}
<div class="form-container">
    <div class="list-group">
        <a href="{{ url_for('account') }}" class="list-group-item list-group-item-action d-flex align-items-center">
            <i class="fa-solid fa-caret-left me-2"></i> E-Mail ändern
        </a>
        <div class="list-group-item">
            <form id="change-email-form" action="{{ url_for('change_email') }}" method="post">
                <div class="mb-3">
                    <p> Aktuelle E-Mail: <strong>{{ current_email if current_email else 'Keine hinterlegt' }}</strong> </p>
                </div>
                <div class="mb-3">
                    <label for="new_email" class="form-label">Neue E-Mail</label>
                    <input type="email" id="new_email" name="new_email" class="form-control w-auto" placeholder="Neue E-Mail" required aria-label="New Email">
                </div>
                <div class="mb-3">
                    <label for="password_confirmation" class="form-label">Mit Passwort bestätigen</label>
                    <input type="password" id="password_confirmation" name="password_confirmation" class="form-control w-auto" placeholder="Passwort" required autocomplete="current-password" aria-label="Password Confirmation">
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary">E-Mail ändern</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
